<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hagit's Apps</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f3; min-height: 100vh; padding: 2rem 1.5rem; color: #1a1a18; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .card { background: white; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; text-decoration: none; color: inherit; display: block; transition: border-color 0.15s; }
    .card:hover { border-color: #aaa; }
    .icon { font-size: 24px; margin-bottom: 10px; }
    .card h3 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .card p { font-size: 13px; color: #888; line-height: 1.5; }
    .tag { display: inline-block; font-size: 11px; background: #f0f0f0; border-radius: 4px; padding: 2px 8px; margin-top: 10px; color: #666; }
  </style>
</head>
<body>
  <h1>Hagit's Apps</h1>
  <p class="subtitle">A collection of small tools and projects</p>

  <div class="grid">

    <a class="card" href="/intervaltimerforlaseminar.html">
      <div class="icon">⏱</div>
      <h3>Interval timer</h3>
      <p>Presentation timer for online and in-person classes</p>
      <span class="tag">Timer</span>
    </a>

    <!-- Add more cards here as you build more apps -->

  </div>
</body>
</html>
