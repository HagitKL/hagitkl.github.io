<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f3;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 3rem;
      color: #1a1a18;
    }

    .root { width: 100%; max-width: 460px; }

    h1 {
      font-size: 17px;
      font-weight: 500;
      text-align: center;
      color: #444441;
      margin-bottom: 1.5rem;
      letter-spacing: 0.01em;
    }

    .badge-row { text-align: center; min-height: 30px; margin-bottom: 10px; }
    .phase-badge {
      display: inline-flex; align-items: center;
      padding: 4px 16px; border-radius: 999px;
      font-size: 13px; font-weight: 500;
      background: #e8e6df; color: #5f5e5a;
      transition: background 0.3s, color 0.3s;
    }

    .timer-ring {
      position: relative; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem; width: 220px; height: 220px;
    }
    .timer-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
    .timer-ring circle { fill: none; stroke-linecap: round; }
    .ring-bg { stroke: #d3d1c7; }
    .ring-fg { transition: stroke-dashoffset 1s linear, stroke 0.4s; }
    .timer-center { text-align: center; z-index: 1; }
    .timer-time {
      font-size: 52px; font-weight: 500; color: #1a1a18;
      line-height: 1; font-variant-numeric: tabular-nums;
    }
    .timer-sub { font-size: 13px; color: #888780; margin-top: 6px; }

    .hint { font-size: 12px; color: #b4b2a9; text-align: center; margin-bottom: 8px; }

    .phase-strip { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .phase-chip {
      flex: 1; border-radius: 8px; padding: 10px 6px 7px;
      text-align: center; border: 0.5px solid #d3d1c7;
      background: #edecea; transition: all 0.25s;
      position: relative; cursor: pointer; user-select: none;
    }
    .phase-chip:hover { border-color: #b4b2a9; }
    .phase-chip .chip-icon { font-size: 16px; margin-bottom: 3px; }
    .phase-chip .chip-name { font-size: 11px; color: #888780; }
    .phase-chip .chip-dur { font-size: 13px; font-weight: 500; color: #1a1a18; }
    .phase-chip.disabled-phase { opacity: 0.35; }
    .phase-chip .check {
      position: absolute; top: 5px; right: 6px;
      width: 15px; height: 15px; border-radius: 50%;
      border: 0.5px solid #b4b2a9; background: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .phase-chip .check svg { width: 8px; height: 8px; display: none; }
    .phase-chip.enabled .check { background: #1D9E75; border-color: #0F6E56; }
    .phase-chip.enabled .check svg { display: block; }

    .phase-chip.active-present { background: #E1F5EE; border-color: #5DCAA5; }
    .phase-chip.active-present .chip-name,
    .phase-chip.active-present .chip-dur { color: #085041; }
    .phase-chip.active-qa { background: #FAEEDA; border-color: #FAC775; }
    .phase-chip.active-qa .chip-name,
    .phase-chip.active-qa .chip-dur { color: #412402; }
    .phase-chip.active-break { background: #EEEDFE; border-color: #AFA9EC; }
    .phase-chip.active-break .chip-name,
    .phase-chip.active-break .chip-dur { color: #26215C; }

    .groups-section { margin-bottom: 1.5rem; }
    .groups-label { font-size: 12px; color: #888780; text-align: center; margin-bottom: 8px; }
    .groups-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .group-dot {
      width: 32px; height: 32px; border-radius: 50%;
      border: 0.5px solid #b4b2a9; background: #edecea;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; color: #888780;
      transition: all 0.4s;
    }
    .group-dot.active-now { border: 2px solid #1D9E75; color: #085041; background: #E1F5EE; }
    .group-dot.complete { background: #1D9E75; border-color: #0F6E56; color: #E1F5EE; }

    .controls {
      display: flex; gap: 10px; justify-content: center;
      margin-bottom: 1.75rem; align-items: center;
    }
    .btn {
      padding: 10px 22px; border-radius: 8px;
      border: 0.5px solid #b4b2a9; background: #fff;
      color: #1a1a18; font-size: 15px; cursor: pointer;
      font-family: inherit; transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #edecea; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
    .btn-go { background: #1D9E75; border-color: #0F6E56; color: #E1F5EE; }
    .btn-go:hover { background: #0F6E56; }
    .btn-skip {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 18px; font-size: 14px;
    }
    .btn-skip svg { width: 14px; height: 14px; flex-shrink: 0; }

    .setting-row {
      display: flex; align-items: center; gap: 12px;
      background: #edecea; border: 0.5px solid #d3d1c7;
      border-radius: 8px; padding: 10px 14px;
    }
    .setting-label { font-size: 14px; color: #1a1a18; flex: 1; }
    .setting-row input[type=range] { width: 120px; accent-color: #1D9E75; }
    .setting-val { font-size: 14px; font-weight: 500; min-width: 32px; text-align: right; }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #f1efe8; }
      h1 { color: #b4b2a9; }
      .phase-badge { background: #2c2c2a; color: #888780; }
      .ring-bg { stroke: #444441; }
      .timer-time { color: #f1efe8; }
      .timer-sub, .groups-label, .hint { color: #888780; }
      .phase-chip { background: #2c2c2a; border-color: #444441; }
      .phase-chip:hover { border-color: #5f5e5a; }
      .phase-chip .chip-name { color: #888780; }
      .phase-chip .chip-dur { color: #f1efe8; }
      .phase-chip .check { background: #1a1a18; border-color: #5f5e5a; }
      .group-dot { background: #2c2c2a; border-color: #5f5e5a; color: #888780; }
      .btn { background: #2c2c2a; border-color: #5f5e5a; color: #f1efe8; }
      .btn:hover { background: #444441; }
      .setting-row { background: #2c2c2a; border-color: #444441; }
      .setting-label { color: #f1efe8; }
    }
  </style>
</head>
<body>
<div class="root">
  <h1>Presentation Timer</h1>

  <div class="badge-row">
    <span class="phase-badge" id="phaseBadge">ready</span>
  </div>

  <div class="timer-ring">
    <svg width="220" height="220" viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="96" stroke-width="10"></circle>
      <circle class="ring-fg" id="ringFg" cx="110" cy="110" r="96" stroke-width="10" stroke-dasharray="603.186" stroke-dashoffset="0" stroke="#1D9E75" style="stroke-dashoffset: 0; stroke: rgb(29, 158, 117);"></circle>
    </svg>
    <div class="timer-center">
      <div class="timer-time" id="timerDisplay">5:00</div>
      <div class="timer-sub" id="timerSub">Presentation · 5 min</div>
    </div>
  </div>

  <p class="hint" id="selectHint">tap a phase to include or exclude it</p>

  <div class="phase-strip">
    <div class="phase-chip enabled" id="chip-0" onclick="togglePhase(0)" style="cursor: pointer;">
      <div class="check">
        <svg viewBox="0 0 8 8" fill="none">
          <polyline points="1,4 3,6 7,2" stroke="#E1F5EE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
        </svg>
      </div>
      <div class="chip-icon">🎤</div>
      <div class="chip-name">Presentation</div>
      <div class="chip-dur">5 min</div>
    </div>
    <div class="phase-chip enabled" id="chip-1" onclick="togglePhase(1)" style="cursor: pointer;">
      <div class="check">
        <svg viewBox="0 0 8 8" fill="none">
          <polyline points="1,4 3,6 7,2" stroke="#E1F5EE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
        </svg>
      </div>
      <div class="chip-icon">❓</div>
      <div class="chip-name">Q &amp; A</div>
      <div class="chip-dur">2 min</div>
    </div>
    <div class="phase-chip enabled" id="chip-2" onclick="togglePhase(2)" style="cursor: pointer;">
      <div class="check">
        <svg viewBox="0 0 8 8" fill="none">
          <polyline points="1,4 3,6 7,2" stroke="#E1F5EE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
        </svg>
      </div>
      <div class="chip-icon">🔀</div>
      <div class="chip-name">Switch rooms</div>
      <div class="chip-dur">1 min</div>
    </div>
  </div>

  <div class="groups-section">
    <div class="groups-label" id="groupsLabel">groups</div>
    <div class="groups-row" id="groupDots"><div class="group-dot" id="gdot-0">1</div><div class="group-dot" id="gdot-1">2</div><div class="group-dot" id="gdot-2">3</div><div class="group-dot" id="gdot-3">4</div></div>
  </div>

  <div class="controls">
    <button class="btn" id="resetBtn" onclick="handleReset()" style="display:none">Reset</button>
    <button class="btn btn-go" id="startBtn" onclick="handleStart()">Start</button>
    <button class="btn btn-skip" id="skipBtn" onclick="handleSkip()" disabled="">
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M3 3l6 5-6 5V3z" fill="currentColor"></path>
        <rect x="11" y="3" width="2" height="10" rx="1" fill="currentColor"></rect>
      </svg>
      Skip
    </button>
  </div>

  <div class="setting-row">
    <span class="setting-label">Number of groups</span>
    <input type="range" min="1" max="12" step="1" value="4" id="roundsSlider" oninput="updateRounds()">
    <span class="setting-val" id="roundsVal">4</span>
  </div>
</div>

<script>
  const CIRC = 603.186;
  const ALL_PHASES = [
    { label: 'Presentation', dur: 300, color: '#1D9E75', badgeBg: '#9FE1CB', badgeText: '#04342C', activeClass: 'active-present' },
    { label: 'Q & A',        dur: 120, color: '#EF9F27', badgeBg: '#FAC775', badgeText: '#412402', activeClass: 'active-qa' },
    { label: 'Switch rooms',  dur: 60,  color: '#7F77DD', badgeBg: '#CECBF6', badgeText: '#26215C', activeClass: 'active-break' },
  ];

  let phaseEnabled = [true, true, true];
  let timer = null, state = 'idle', activePhaseIdx = 0, round = 0, timeLeft = 0, totalRounds = 4;
  let activePhasesCache = [];

  function getActivePhases() { return ALL_PHASES.filter((_, i) => phaseEnabled[i]); }

  function togglePhase(i) {
    if (state !== 'idle') return;
    if (phaseEnabled[i] && phaseEnabled.filter(Boolean).length === 1) return;
    phaseEnabled[i] = !phaseEnabled[i];
    updateChipStyles();
    syncIdleDisplay();
  }

  function updateChipStyles() {
    for (let i = 0; i < 3; i++) {
      const chip = document.getElementById('chip-' + i);
      chip.style.pointerEvents = state !== 'idle' ? 'none' : '';
      chip.style.cursor = state !== 'idle' ? 'default' : 'pointer';
      chip.className = 'phase-chip ' + (phaseEnabled[i] ? 'enabled' : 'disabled-phase');
    }
  }

  function syncIdleDisplay() {
    const phases = getActivePhases();
    if (!phases.length) return;
    const ph = phases[0];
    timeLeft = ph.dur;
    document.getElementById('timerDisplay').textContent = fmt(ph.dur);
    document.getElementById('timerSub').textContent = ph.label + ' · ' + (ph.dur / 60) + ' min';
    document.getElementById('ringFg').style.strokeDashoffset = 0;
    document.getElementById('ringFg').style.stroke = ph.color;
    document.getElementById('selectHint').style.display = '';
  }

  function fmt(s) { const m = Math.floor(s / 60), sec = s % 60; return m + ':' + (sec < 10 ? '0' : '') + sec; }

  function updateRounds() {
    totalRounds = +document.getElementById('roundsSlider').value;
    document.getElementById('roundsVal').textContent = totalRounds;
    buildDots();
  }

  function buildDots() {
    const el = document.getElementById('groupDots');
    el.innerHTML = '';
    for (let r = 0; r < totalRounds; r++) {
      const d = document.createElement('div');
      d.className = 'group-dot'; d.id = 'gdot-' + r; d.textContent = r + 1;
      el.appendChild(d);
    }
    paintDots();
  }

  function paintDots() {
    for (let r = 0; r < totalRounds; r++) {
      const el = document.getElementById('gdot-' + r);
      if (!el) continue;
      if (r < round) el.className = 'group-dot complete';
      else if (r === round && (state === 'running' || state === 'paused')) el.className = 'group-dot active-now';
      else el.className = 'group-dot';
    }
    document.getElementById('groupsLabel').textContent =
      state === 'idle' ? 'groups' :
      state === 'done' ? 'all ' + totalRounds + ' groups done!' :
      'group ' + (round + 1) + ' of ' + totalRounds + ' · ' + round + ' complete';
  }

  function render() {
    const phases = activePhasesCache;
    if (!phases.length) return;
    const ph = phases[activePhaseIdx];
    const progress = timeLeft / ph.dur;
    document.getElementById('timerDisplay').textContent = fmt(timeLeft);
    document.getElementById('timerSub').textContent = ph.label + ' · ' + (ph.dur / 60) + ' min';
    const offset = CIRC * (1 - Math.max(0, Math.min(1, progress)));
    document.getElementById('ringFg').style.strokeDashoffset = offset;
    document.getElementById('ringFg').style.stroke = ph.color;

    const badge = document.getElementById('phaseBadge');
    if (state === 'idle' || state === 'done' || state === 'paused') {
      badge.textContent = state === 'idle' ? 'ready' : state === 'done' ? 'complete!' : 'paused';
      badge.style.background = ''; badge.style.color = '';
    } else {
      badge.textContent = ph.label;
      badge.style.background = ph.badgeBg;
      badge.style.color = ph.badgeText;
    }

    for (let i = 0; i < 3; i++) {
      const chip = document.getElementById('chip-' + i);
      const isCurrent = state === 'running' && phases[activePhaseIdx] === ALL_PHASES[i];
      chip.className = 'phase-chip ' + (phaseEnabled[i] ? 'enabled' : 'disabled-phase') + (isCurrent ? ' ' + ALL_PHASES[i].activeClass : '');
    }

    document.getElementById('skipBtn').disabled = (state !== 'running' && state !== 'paused');
    paintDots();
  }

  function beep(freq, dur, vol) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }

  function signalForPhase(ph) {
    if (ph === ALL_PHASES[0]) { beep(880, 0.2); }
    else if (ph === ALL_PHASES[1]) { beep(660, 0.15); setTimeout(() => beep(660, 0.15), 200); }
    else { beep(440, 0.12); setTimeout(() => beep(550, 0.12), 180); setTimeout(() => beep(440, 0.12), 360); }
  }

  function advancePhase() {
    const phases = activePhasesCache;
    activePhaseIdx++;
    if (activePhaseIdx >= phases.length) {
      activePhaseIdx = 0; round++;
      if (round >= totalRounds) { finish(); return false; }
    }
    timeLeft = phases[activePhaseIdx].dur;
    signalForPhase(phases[activePhaseIdx]);
    return true;
  }

  function tick() {
    timeLeft--;
    if (timeLeft <= 3 && timeLeft > 0) beep(660, 0.08, 0.15);
    if (timeLeft <= 0) { if (!advancePhase()) return; }
    render();
  }

  function finish() {
    clearInterval(timer); timer = null; state = 'done'; timeLeft = 0;
    render();
    document.getElementById('startBtn').textContent = 'Start again';
    document.getElementById('startBtn').className = 'btn btn-go';
    document.getElementById('timerSub').textContent = 'all ' + totalRounds + ' groups done!';
    beep(523, 0.2); setTimeout(() => beep(659, 0.2), 250); setTimeout(() => beep(784, 0.35), 500);
  }

  function handleSkip() {
    if (state !== 'running' && state !== 'paused') return;
    const wasRunning = state === 'running';
    if (wasRunning) clearInterval(timer);
    if (!advancePhase()) return;
    render();
    if (wasRunning) timer = setInterval(tick, 1000);
  }

  function handleStart() {
    if (state === 'idle' || state === 'done') {
      activePhasesCache = getActivePhases();
      if (!activePhasesCache.length) return;
      activePhaseIdx = 0; round = 0;
      timeLeft = activePhasesCache[0].dur; state = 'running';
      document.getElementById('startBtn').textContent = 'Pause';
      document.getElementById('startBtn').className = 'btn';
      document.getElementById('resetBtn').style.display = '';
      document.getElementById('roundsSlider').disabled = true;
      document.getElementById('selectHint').style.display = 'none';
      updateChipStyles();
      signalForPhase(activePhasesCache[0]);
      render();
      timer = setInterval(tick, 1000);
    } else if (state === 'running') {
      clearInterval(timer); timer = null; state = 'paused';
      document.getElementById('startBtn').textContent = 'Resume';
      document.getElementById('startBtn').className = 'btn btn-go';
      render();
    } else if (state === 'paused') {
      state = 'running';
      document.getElementById('startBtn').textContent = 'Pause';
      document.getElementById('startBtn').className = 'btn';
      timer = setInterval(tick, 1000);
      render();
    }
  }

  function handleReset() {
    clearInterval(timer); timer = null;
    state = 'idle'; activePhaseIdx = 0; round = 0; activePhasesCache = [];
    document.getElementById('startBtn').textContent = 'Start';
    document.getElementById('startBtn').className = 'btn btn-go';
    document.getElementById('resetBtn').style.display = 'none';
    document.getElementById('roundsSlider').disabled = false;
    document.getElementById('selectHint').style.display = '';
    updateChipStyles();
    syncIdleDisplay();
    buildDots();
  }

  buildDots();
  syncIdleDisplay();
  updateChipStyles();
</script>


</body></html>
